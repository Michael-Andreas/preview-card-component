<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png" />

    <title>Frontend Mentor | Stats preview card component</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lexend+Deca:wght@100..900&display=swap"
      rel="stylesheet" />

    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <div class="image-container">
        <img
          src="./images/image-header-mobile.jpg"
          alt="people in the office working" />
      </div>
      <section>
        <h1>Get <span>insights</span> that help your business grow.</h1>
        <p>
          Discover the benefits of data analytics and make better decisions
          regarding revenue, customer experience, and overall efficiency.
        </p>
        <ul class="stats-list">
          <li class="stat-item">
            <span class="stat-value" aria-label="Over 10,000">10k+</span>
            <span class="stat-label">Companies</span>
          </li>
          <li class="stat-item">
            <span class="stat-value">314</span>
            <span class="stat-label">Templates</span>
          </li>
          <li class="stat-item">
            <span class="stat-value" aria-label="Over 12 million">12M+</span>
            <span class="stat-label">Queries</span>
          </li>
        </ul>
      </section>
    </main>
  </body>
</html>
